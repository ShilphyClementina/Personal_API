$kind: http-request
name: POST_Login
description: "Generated from cURL: curl -X 'POST' \\\r

  \  'https://practice.expandtesting.com/notes/api/users/login' \\\r

  \  -H 'accept: application/json' \\\r

  \  -H 'Content-Type: application/x-www-form-urlencoded' \\\r

  \  -d 'email=test123%40test.com&password=test%40123'"
url: "{{Base_URI}}{{Login}}"
method: POST
headers:
  accept: application/json
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    email: "{{Email}}"
    password: test@123
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code check\", function(){\r

      \    pm.response.to.have.status(200);\r

      })\r

      \r

      pm.test(\"Set Token\", function(){\r

      \    var response = pm.response.json();\r

      \    pm.collectionVariables.set(\"Token\", response.data.token);\r

      })"
    language: text/javascript
order: 2000
